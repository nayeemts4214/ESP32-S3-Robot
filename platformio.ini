; ============================================================
;  ESP32-S3-N16R8 Autonomous Robot — PlatformIO project
;  Board: ESP32-S3-N16R8 DevKitC-1 (16 MB flash / 8 MB octal PSRAM)
; ============================================================

[platformio]
default_envs = robot

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; ---- N16R8 memory config: 16MB flash (Quad I/O) + 8MB PSRAM (Octal I/O) ----
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv
build_flags =
    -DBOARD_HAS_PSRAM

; Only DS18B20 needs an external library (OneWire timing is
; genuinely tricky to hand-roll reliably). Everything else uses
; only what's already built into the Arduino-ESP32 core.
lib_deps =
    milesburton/DallasTemperature@^4.0.4
    paulstoffregen/OneWire@^2.3.8

[env:robot]
build_src_filter = +<*> -<tests/>

[env:test_adxl345]
build_src_filter = -<*> +<tests/test_adxl345.cpp>

[env:test_acs712]
build_src_filter = -<*> +<tests/test_acs712.cpp>

[env:test_ds18b20]
build_src_filter = -<*> +<tests/test_ds18b20.cpp>

[env:test_motor]
build_src_filter = -<*> +<tests/test_motor.cpp>

[env:test_encoder]
build_src_filter = -<*> +<tests/test_encoder.cpp>

[env:test_sdcard]
build_src_filter = -<*> +<tests/test_sdcard.cpp>
